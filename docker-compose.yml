# FILE: docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: assistant
    ports: ["5433:5432"] # Keep your 5433 mapping for backward compatibility
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistant"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      # Talks directly to the 'db' container on port 5432
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/assistant
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db: { condition: service_healthy }
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    environment:
      # Tells the React app where to find the backend from the user's browser
      VITE_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["5173:5173"]

volumes:
  pgdata: